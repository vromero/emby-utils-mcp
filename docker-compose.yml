# Run the Emby MCP server in HTTP/SSE mode.
#
# Quickstart:
#   cp .env.example .env          # edit EMBY_HOST / EMBY_API_KEY
#   docker compose up -d
#   curl http://localhost:3000/healthz
#
# MCP clients that support the Streamable HTTP transport can then point at
# `http://localhost:3000/mcp`.
#
# To run against a local (not-yet-published) @emby-utils/client tarball:
#   (in the client repo) npm run build && npm pack
#   cp emby-utils-client-0.1.0.tgz ../emby-utils-mcp/docker/
#   docker compose build --build-arg CLIENT_TARBALL=docker/emby-utils-client-0.1.0.tgz
#   docker compose up -d

services:
  emby-mcp:
    image: ghcr.io/vromero/emby-utils-mcp:latest
    # Uncomment to build locally instead of pulling from GHCR:
    # build:
    #   context: .
    #   args:
    #     CLIENT_TARBALL: ""   # e.g. docker/emby-utils-client-0.1.0.tgz
    container_name: emby-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      EMBY_HOST: ${EMBY_HOST:?EMBY_HOST is required}
      EMBY_API_KEY: ${EMBY_API_KEY:?EMBY_API_KEY is required}
      # Override MCP server bind address / port if needed.
      EMBY_MCP_HOST: 0.0.0.0
      EMBY_MCP_PORT: "3000"
    # The image already declares a HEALTHCHECK hitting /healthz; compose
    # surfaces its state via `docker compose ps`.
