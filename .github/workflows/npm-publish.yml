name: npm Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (must already exist, e.g. v0.1.0)"
        required: true

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # `id-token: write` is needed for npm's provenance attestations
  # (`--provenance`), which associate the published tarball with the
  # exact GitHub Actions run that produced it.
  id-token: write

jobs:
  publish:
    name: Publish @emby-utils/server to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: "https://registry.npmjs.org"
          # `registry-url` + NODE_AUTH_TOKEN is the documented way to wire up
          # npm auth for publishing in a GitHub Actions job.

      - name: Verify tag matches package.json version
        # Prevents the classic `git tag v0.2.0 && push` while package.json
        # still says 0.1.0 footgun. The workflow fails before publishing
        # anything on mismatch.
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          tag_version="${ref#v}"
          pkg_version=$(node -p "require('./package.json').version")
          echo "tag: $ref (version: $tag_version)"
          echo "package.json version: $pkg_version"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package.json version ($pkg_version)."
            exit 1
          fi

      - name: Install
        run: npm ci

      # `prepack` in package.json runs `npm run build` automatically before
      # publish, so dist/ is always fresh. We still run the test suite
      # separately as a release-time safety net.
      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
